name: Autonomous Issue Audit

on:
  schedule:
    # Midnight Audit (ISSUE mode)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  agent-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Issue Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
        run: npm run issue-agent
