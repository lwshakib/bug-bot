name: Autonomous Repo Management

on:
  schedule:
    # 1. Midnight Audit (ISSUE mode)
    - cron: '0 0 * * *'
    # 2. 2 AM Fix Cycle (PR mode)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent mode'
        required: true
        default: 'ISSUE'
        type: choice
        options:
          - ISSUE
          - PR

jobs:
  agent-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.mode }}" == "ISSUE" ]]; then
              npm run issue-agent
            else
              npm run pr-agent
            fi
          elif [[ "${{ github.event.schedule }}" == "0 0 * * *" ]]; then
            npm run issue-agent
          else
            npm run pr-agent
          fi
